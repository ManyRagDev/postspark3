        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
        }
        
        .spark-text {
            background: linear-gradient(90deg, #fff 0%, #ffd700 50%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 200% center; }
        }
        
        .spark-glow {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4), 0 0 80px rgba(255, 215, 0, 0.15);
        }
        
        .card-gradient {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9) 0%, rgba(22, 33, 62, 0.9) 100%);
            backdrop-filter: blur(10px);
        }
        
        .post-card {
            aspect-ratio: 5/6;
            max-width: 400px;
            width: 100%;
        }
        
        /* Spark Particles */
        .spark-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #ffd700 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        @keyframes sparkFloat {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 0.4; }
        }
        
        /* Post Styles */
        .creative-area {
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 40%, #0f0f1a 100%);
            position: relative;
            overflow: hidden;
        }
        
        .creative-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: radial-gradient(ellipse at 50% -20%, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .logo-glow {
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.35));
        }
        
        .badge {

            border: 1px solid rgba(255, 215, 0, 0.4);
            backdrop-filter: blur(10px);
        }
        
        /* UI Elements */
        .btn-spark {
            background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
            color: #0a0a0f;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        
        .btn-spark:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        
        .selector-btn {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .selector-btn:hover, .selector-btn.active {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .selector-btn.active {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
        }
        
        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffd700;
        }
        
        .float-gentle {
            animation: floatGentle 6s ease-in-out infinite;
        }
        
        @keyframes floatGentle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }

        function copyToClipboard() {
            const post = posts[currentPost];
            navigator.clipboard.writeText(post.copy).then(() => {
                const btn = event.target.closest('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="text-green-400">✓ Copiado!</span>';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }

        async function downloadPost() {
            const preview = document.getElementById('post-preview');
            
            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Gerando...';
            btn.disabled = true;
            
            try {
                const canvas = await html2canvas(preview, {
                    scale: 2,
                    backgroundColor: '#0a0a0f',
                    useCORS: true,
                    allowTaint: false,
                    logging: false,
                    width: preview.offsetWidth,
                    height: preview.offsetHeight
                });
                
                const link = document.createElement('a');
                link.download = `postspark-post-${currentPost}-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerHTML = '<span class="text-green-400">✓ Baixado!</span>';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('Erro ao gerar PNG:', error);
                btn.innerHTML = '<span class="text-red-400">Erro</span>';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
            }
        }

        function createParticles() {
            const container = document.getElementById('spark-container');

                particle.style.position = 'fixed';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animation = `sparkFloat ${(Math.random() * 2 + 2)}s ease-in-out infinite`;
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.opacity = '0.3';
                particle.style.width = '2px';
                particle.style.height = '2px';
                container.appendChild(particle);
            }
        }
